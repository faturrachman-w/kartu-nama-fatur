<!-- DARK MODE SWITCHER -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card_Fatur</title>
   <link rel="stylesheet" href="style.css">
   <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="card" id="myCard">

        <img src="oi.jpg" class="foto" id="myFoto">
        <h2 class="nama">FATURRACHMAN WIGUNA</h2>
        <p class="alamat">Prospective Programmer And Young Chili Farmer</p>

        <div class="sosmed">
            <a href="#"><i class="fa-brands fa-instagram"></i></a>
            <a href="#"><i class="fa-brands fa-github"></i></a>
            <a href="#"><i class="fa-brands fa-linkedin"></i></a>
        </div>
        
        <div class="about">
        <h3>About Me</h3>
        <p>Hi! I'm a college student studying web development. I love coffee, coding, and exploring new things</p>
        </div>
        <button onclick="ubahWarna()" id="btnUtama">Switch Mode</button>
    </div>

    
<script>
    function ubahWarna() {
    const kartu = document.getElementById('myCard');
    const foto = document.getElementById('myFoto');
    const tombol = document.getElementById('btnUtama');
    const semuaIcon = document.querySelectorAll('.sosmed a');
    const nama = document.querySelector('h2'); 
    const alamat = document.querySelector('.alamat');
    const aboutJudul = document.querySelector('.about h3');
    const aboutTeks = document.querySelector('.about p');

    kartu.classList.toggle('dark-mode-active');

    if (kartu.classList.contains('dark-mode-active')) {
        // --- MODE GELAP (HITAM HIJAU) ---
        // 1. Ganti Background Body (Layar)
        document.documentElement.style.setProperty('--bg-body', 'linear-gradient(135deg, #000000 0%, #002b2b 100%)');
        
        // 2. Ganti Background Kartu
        document.documentElement.style.setProperty('--bg-kartu', 'rgba(0, 0, 0, 0.7)');
        
        // 3. Ganti Warna Neon
        document.documentElement.style.setProperty('--warna-neon', '#00b3b3');

        // Sisanya (teks & ikon)
        nama.style.color = 'white';
        alamat.style.color = 'white';
        if(aboutJudul) aboutJudul.style.color = 'white';
        if(aboutTeks) aboutTeks.style.color = '#ddd';
        foto.style.borderColor = '#00b3b3';
        tombol.style.backgroundColor = '#00b3b3';
        semuaIcon.forEach(icon => icon.style.color = '#00b3b3');
        foto.style.boxShadow = '0 0 20px rgba(0, 179, 179, 0.6)';

    } else {
        // --- MODE TERANG (UNGU) ---
        // 1. Balikin Background Body
        document.documentElement.style.setProperty('--bg-body', 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)');
        
        // 2. Balikin Background Kartu
        document.documentElement.style.setProperty('--bg-kartu', 'rgba(255, 255, 255, 0.1)');
        
        // 3. Balikin Warna Neon
        document.documentElement.style.setProperty('--warna-neon', '#667eea');

        // Sisanya (teks & ikon)
        nama.style.color = '#333';
        alamat.style.color = '#333';
        if(aboutJudul) aboutJudul.style.color = '#333';
        if(aboutTeks) aboutTeks.style.color = '#333';
        foto.style.borderColor = '#667eea';
        tombol.style.backgroundColor = '#333';
        semuaIcon.forEach(icon => icon.style.color = '#333');
        foto.style.boxShadow = '0 4px 8px #333';
    }
}
    
</script>
</body>

</html>
